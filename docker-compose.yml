services:
  ollama:
    image: ollama/ollama:0.17.7
    container_name: ollama
    restart: unless-stopped
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ./ollama:/root/.ollama
    expose:
      - "11434"
    networks:
      - ai_internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 10g

  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.8.6
    container_name: openwebui
    restart: unless-stopped
    depends_on:
      - ollama
      - agent-runner
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "True"
      DEFAULT_USER_ROLE: user
      ENABLE_SIGNUP: "False"
      # Pre-register the agent tool server as a Global Tool Server.
      # Users must toggle it on per chat via the ➕ menu (hidden by default).
      # The api_key is intentionally empty: agent-runner is only reachable
      # within the internal Docker network and is not exposed to the host.
      TOOL_SERVER_CONNECTIONS: '[{"url":"http://agent-runner:9000","api_key":""}]'
    volumes:
      - ./openwebui:/app/backend/data
    ports:
      - "127.0.0.1:3000:8080"
    networks:
      - ai_internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    tmpfs:
      - /tmp:size=256m,mode=1777

  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: qdrant
    restart: unless-stopped
    expose:
      - "6333"
      - "6334"
    volumes:
      - ./qdrant:/qdrant/storage
    networks:
      - ai_internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256

  playwright:
    image: mcr.microsoft.com/playwright:v1.55.0-jammy
    container_name: playwright
    restart: unless-stopped
    command: ["sleep", "infinity"]
    shm_size: "1gb"
    networks:
      - ai_internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    tmpfs:
      - /tmp:size=512m,mode=1777

  interpreter:
    build: ./interpreter
    image: ai-stack-interpreter:latest
    container_name: open-interpreter
    restart: unless-stopped
    working_dir: /workspace
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      INTERPRETER_MODEL: ollama_chat/llama3
      JOBS_DIR: /workspace/agent/jobs
    volumes:
      - ./workspace:/workspace
    depends_on:
      - ollama
      - qdrant
      - playwright
    networks:
      - ai_internal
    expose:
      - "8888"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    tmpfs:
      - /tmp:size=512m,mode=1777

  agent-runner:
    build: ./agent-runner
    image: ai-stack-agent-runner:latest
    container_name: agent-runner
    restart: unless-stopped
    environment:
      INTERPRETER_GATEWAY_URL: http://interpreter:8888
    volumes:
      - ./workspace:/workspace:ro
    depends_on:
      interpreter:
        condition: service_healthy
    networks:
      - ai_internal
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    tmpfs:
      - /tmp:size=256m,mode=1777

networks:
  ai_internal:
    driver: bridge
    internal: true
